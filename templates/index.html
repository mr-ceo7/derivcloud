<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Deriv Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Deriv Auto-Trader</h1>
            <div id="status-badge" class="badge stopped">STOPPED</div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <h3>Profit/Loss</h3>
                <div id="profit" class="value">$0.00</div>
            </div>
            <div class="card">
                <h3>Balance</h3>
                <div id="balance" class="value">Loading...</div>
            </div>
            <div class="card">
                <h3>Wins</h3>
                <div id="wins" class="value">0</div>
            </div>
            <div class="card">
                <h3>Losses</h3>
                <div id="losses" class="value">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="card settings-panel">
                <h2>Configuration</h2>
                <div class="form-group">
                    <label>API Token</label>
                    <input type="password" id="token" placeholder="Enter Deriv API Token">
                </div>
                <div class="form-group">
                    <label>Market</label>
                    <select id="market">
                        <option value="1HZ100V" selected>Volatility 100 (1s) Index</option>
                        <option value="R_100">Volatility 100 Index</option>
                        <option value="1HZ10V">Volatility 10 (1s) Index</option>
                        <option value="R_10">Volatility 10 Index</option>
                    </select>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Stake ($)</label>
                        <input type="number" id="stake" value="0.35" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Duration (ticks)</label>
                        <input type="number" id="duration" value="1">
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Prediction Digit (Over X)</label>
                        <input type="number" id="prediction" value="0" min="0" max="8">
                        <small>Trades trigger if digit > X</small>
                    </div>
                    <div class="form-group">
                        <label>Consecutive Triggers</label>
                        <input type="number" id="consecutive" value="1" min="1">
                        <small>Wait for X times match</small>
                    </div>
                </div>
                <div class="actions">
                    <button id="save-btn" onclick="saveSettings()">Save Settings</button>
                    <button id="start-btn" onclick="startBot()">Start Bot</button>
                    <button id="stop-btn" onclick="stopBot()" disabled>Stop</button>
                    <button id="reset-btn" onclick="resetStats()" style="background: #30363d; margin-left: 10px;">Reset
                        Stats</button>
                </div>
            </div>

            <div class="card logs-panel">
                <h2>Live Logs</h2>
                <div id="logs" class="log-container">
                    <div class="log-entry">Waiting for connection...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
